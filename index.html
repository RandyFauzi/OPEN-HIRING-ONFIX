<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruitment | ONFIX</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/rZPI2oE.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f8fafc;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        .role-card:hover {
            transform: translateY(-5px);
            transition: all 0.3s ease;
        }

        .hidden-step {
            display: none;
        }

        .loader {
            border-top-color: #2563eb;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-xl">
        <div class="text-center mb-8">
            <img src="https://i.imgur.com/rZPI2oE.png" alt="ONFIX Logo" class="h-16 mx-auto mb-2 drop-shadow-sm">
            <p class="text-gray-500 font-medium italic text-sm">#SelaluSiapHasilAman</p>
        </div>

        <div id="step-selection"
            class="glass-card p-8 rounded-3xl shadow-xl border border-gray-100 text-center animate-fade-in">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Selamat Datang!</h1>
            <p class="text-gray-600 mb-8">Pilih jenis kemitraan Anda untuk memulai pendaftaran</p>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <button onclick="selectRole('Teknisi')"
                    class="role-card p-6 border-2 border-blue-50 hover:border-blue-500 hover:bg-blue-50 rounded-2xl text-left transition-all">
                    <div class="bg-blue-500 w-12 h-12 rounded-xl flex items-center justify-center mb-4 text-white">
                        <i class="fas fa-tools text-xl"></i>
                    </div>
                    <h3 class="font-bold text-gray-800">Teknisi AC</h3>
                    <p class="text-xs text-gray-500 mt-1">Daftar sebagai teknisi perorangan/individu.</p>
                </button>

                <button onclick="selectRole('Vendor')"
                    class="role-card p-6 border-2 border-blue-50 hover:border-blue-500 hover:bg-blue-50 rounded-2xl text-left transition-all">
                    <div class="bg-indigo-600 w-12 h-12 rounded-xl flex items-center justify-center mb-4 text-white">
                        <i class="fas fa-building text-xl"></i>
                    </div>
                    <h3 class="font-bold text-gray-800">Vendor / Subkon</h3>
                    <p class="text-xs text-gray-500 mt-1">Daftar sebagai perusahaan jasa atau tim vendor.</p>
                </button>
            </div>
        </div>

        <div id="step-form"
            class="hidden-step glass-card p-8 rounded-3xl shadow-xl border border-gray-100 animate-fade-in">
            <div class="flex items-center mb-6">
                <button onclick="goBack()" class="text-gray-400 hover:text-blue-600 mr-4">
                    <i class="fas fa-arrow-left text-lg"></i>
                </button>
                <h2 class="text-xl font-bold text-gray-800">Form Pendaftaran <span id="display-role"
                        class="text-blue-600"></span></h2>
            </div>

            <form id="mainForm" class="space-y-4">
                <input type="hidden" id="input-role">

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Nama Lengkap /
                        Nama Vendor</label>
                    <input type="text" id="nama" required
                        class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all"
                        placeholder="Input nama sesuai identitas">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">No.
                            WhatsApp</label>
                        <input type="number" id="whatsapp" required
                            class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all"
                            placeholder="08xxxx">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Email
                            Aktif</label>
                        <input type="email" id="email" required
                            class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all"
                            placeholder="contoh@mail.com">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Domisili Saat
                        Ini</label>
                    <input type="text" id="domisili" required
                        class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all"
                        placeholder="Kota / Kabupaten">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Ringkasan
                        Pengalaman</label>
                    <textarea id="pengalaman" required rows="3"
                        class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all"
                        placeholder="Sebutkan pengalaman kerja atau spesialisasi tim Anda..."></textarea>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Upload Berkas Lampiran Pendukung
                        (ZIP/PDF)</label>
                    <div
                        class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-200 border-dashed rounded-xl hover:border-blue-400 transition-all cursor-pointer relative">
                        <div class="space-y-1 text-center">
                            <i class="fas fa-cloud-upload-alt text-3xl text-gray-300 mb-2"></i>
                            <div class="flex text-sm text-gray-600">
                                <span class="font-medium text-blue-600 hover:text-blue-500">Pilih file</span>
                                <p class="pl-1">atau drag and drop</p>
                            </div>
                            <p class="text-xs text-gray-400">CV, Portfolio, KTP (Max. 3MB)</p>
                        </div>
                        <input id="berkas" type="file" accept=".zip,.pdf,.rar" required
                            class="absolute inset-0 opacity-0 cursor-pointer">
                    </div>
                    <p id="file-name-display" class="text-xs text-blue-500 mt-2 font-medium"></p>
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                    Kirim Lamaran Sekarang
                </button>

                <div id="loading" class="hidden text-center py-4">
                    <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-10 w-10 mx-auto">
                    </div>
                    <p class="text-sm text-gray-500 mt-2 font-medium">Memproses data Anda...</p>
                </div>
            </form>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz-rlhz6YFDrmLIAZG4PeFM059t5hoLB33iVnURGtDi3wtAWNatALEst7yFjWm8WAxc6Q/exec';

        function selectRole(role) {
            document.getElementById('step-selection').classList.add('hidden-step');
            document.getElementById('step-form').classList.remove('hidden-step');
            document.getElementById('display-role').innerText = role;
            document.getElementById('input-role').value = role;
        }

        function goBack() {
            document.getElementById('step-form').classList.add('hidden-step');
            document.getElementById('step-selection').classList.remove('hidden-step');
        }

        const fileInput = document.getElementById('berkas');
        fileInput.addEventListener('change', function () {
            document.getElementById('file-name-display').innerText = this.files[0] ? '📎 ' + this.files[0].name : '';
        });

        const form = document.getElementById('mainForm');
        form.addEventListener('submit', e => {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const load = document.getElementById('loading');

            if (fileInput.files[0].size > 3 * 1024 * 1024) {
                Swal.fire({
                    icon: 'warning',
                    title: 'File Terlalu Besar!',
                    text: 'Maksimal ukuran file adalah 3MB.',
                    confirmButtonColor: '#3b82f6'
                });
                return;
            }

            btn.classList.add('hidden');
            load.classList.remove('hidden');

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = function (event) {
                const base64Data = event.target.result.split(',')[1];
                const formData = {
                    role: document.getElementById('input-role').value,
                    nama: document.getElementById('nama').value,
                    whatsapp: document.getElementById('whatsapp').value,
                    email: document.getElementById('email').value,
                    domisili: document.getElementById('domisili').value,
                    pengalaman: document.getElementById('pengalaman').value,
                    fileName: file.name,
                    fileType: file.type,
                    fileData: base64Data
                };

                fetch(scriptURL, { method: 'POST', body: JSON.stringify(formData) })
                    .then(res => res.json())
                    .then(res => {
                        if (res.result === 'success') {
                            Swal.fire({
                                icon: 'success',
                                title: 'Berhasil!',
                                text: 'Lamaran Anda telah kami terima.',
                                confirmButtonColor: '#3b82f6'
                            }).then(() => {
                                window.location.reload();
                            });
                        }
                    })
                    .catch(err => {
                        Swal.fire({
                            icon: 'error',
                            title: 'Gagal',
                            text: 'Gagal mengirim data. Coba lagi.',
                            confirmButtonColor: '#3b82f6'
                        });
                    })
                    .finally(() => {
                        btn.classList.remove('hidden');
                        load.classList.add('hidden');
                    });
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>

</html>
